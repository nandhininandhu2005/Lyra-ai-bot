<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Lyra AI">
<title>Lyra AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1a;--sur:#111827;--sur2:#1a2235;--ub:#2563eb;--bb:#1a2235;--ac:#6366f1;--ac2:#818cf8;--tx:#f1f5f9;--txm:#64748b;--txd:#94a3b8;--bor:rgba(99,102,241,0.15);--grn:#22c55e;--err:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);height:100dvh;display:flex;flex-direction:column;overflow:hidden;color:var(--tx);}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.07) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(139,92,246,0.05) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* HEADER */
.hdr{position:relative;z-index:100;background:rgba(17,24,39,0.97);backdrop-filter:blur(20px);padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bor);flex-shrink:0;}
.back{color:var(--ac2);font-size:24px;cursor:pointer;padding:4px;}
.ava{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6,#3b82f6);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;box-shadow:0 0 18px rgba(99,102,241,0.4);position:relative;}
.ava::after{content:'';position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:var(--grn);border:2px solid var(--sur);}
.binfo{flex:1;}
.bname{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;}
.bstat{font-size:12px;color:var(--grn);font-weight:500;margin-top:1px;}
.hacts{display:flex;gap:4px;}
.hbtn{color:var(--txm);font-size:18px;cursor:pointer;padding:8px;border-radius:50%;border:none;background:transparent;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.hbtn:hover{color:var(--ac2);background:rgba(99,102,241,0.1);}

/* SEARCH BAR */
.sbar{display:none;position:relative;z-index:99;background:rgba(17,24,39,0.97);padding:8px 14px;border-bottom:1px solid var(--bor);}
.sbar.show{display:flex;align-items:center;gap:10px;}
.sinp{flex:1;background:var(--sur2);border:1px solid var(--bor);border-radius:20px;padding:8px 16px;color:var(--tx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.sinp:focus{border-color:rgba(99,102,241,0.4);}
.scls{color:var(--txm);cursor:pointer;font-size:18px;padding:4px;}

/* DROPDOWN */
.ovl{display:none;position:fixed;inset:0;z-index:150;}
.ovl.show{display:block;}
.ddrop{display:none;position:absolute;top:62px;right:12px;z-index:200;background:#1a2235;border:1px solid var(--bor);border-radius:14px;overflow:hidden;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:ddIn 0.15s ease;}
.ddrop.show{display:block;}
@keyframes ddIn{from{opacity:0;transform:translateY(-8px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.ditem{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;font-size:14px;color:var(--txd);transition:background 0.15s;border:none;background:transparent;width:100%;font-family:'DM Sans',sans-serif;}
.ditem:hover{background:rgba(99,102,241,0.12);color:var(--tx);}
.ditem .ic{font-size:16px;width:20px;text-align:center;}
.dsep{height:1px;background:var(--bor);margin:4px 0;}

/* CHAT */
.chat{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 10px 10px;position:relative;z-index:1;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px;}
.dsep2{text-align:center;margin:12px 0;display:flex;align-items:center;gap:10px;}
.dsep2::before,.dsep2::after{content:'';flex:1;height:1px;background:var(--bor);}
.dsep2 span{font-size:11px;color:var(--txm);font-weight:500;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;}

/* MESSAGES */
.mrow{display:flex;margin-bottom:3px;animation:mIn 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.mrow.user{justify-content:flex-end;}
.mrow.bot{justify-content:flex-start;}
.mrow.gap{margin-bottom:10px;}
@keyframes mIn{from{opacity:0;transform:translateY(10px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.bub{max-width:78%;padding:10px 13px 26px;position:relative;word-wrap:break-word;line-height:1.5;font-size:15px;}
.bub.user{background:var(--ub);color:#fff;border-radius:20px 20px 5px 20px;margin-right:4px;box-shadow:0 3px 14px rgba(37,99,235,0.3);}
.bub.bot{background:var(--bb);color:var(--tx);border-radius:20px 20px 20px 5px;margin-left:4px;border:1px solid var(--bor);box-shadow:0 3px 14px rgba(0,0,0,0.2);}
.bub a{color:#818cf8;text-decoration:none;border-bottom:1px solid rgba(129,140,248,0.3);}
.bub.user a{color:#bfdbfe;}
.bub strong{font-weight:600;}
.bub em{font-style:italic;opacity:0.9;}
.bub code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:5px;font-size:13px;font-family:'Courier New',monospace;}
.mmeta{position:absolute;bottom:6px;right:12px;display:flex;align-items:center;gap:4px;}
.mtime{font-size:11px;color:rgba(255,255,255,0.4);}
.bub.bot .mtime{color:var(--txm);}
.tks{font-size:12px;color:#93c5fd;}
.ttsbtn{display:inline-flex;align-items:center;gap:4px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:var(--txm);font-size:11px;font-family:'DM Sans',sans-serif;padding:3px 10px;border-radius:20px;cursor:pointer;margin-top:6px;transition:all 0.2s;}
.ttsbtn:hover,.ttsbtn.sp{background:rgba(99,102,241,0.2);color:var(--ac2);}

/* TYPING */
.trow{display:flex;justify-content:flex-start;margin-bottom:10px;}
.tbub{background:var(--bb);border:1px solid var(--bor);border-radius:20px 20px 20px 5px;padding:13px 17px;margin-left:4px;display:flex;gap:5px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ac2);animation:bnc 1.3s ease infinite;}
.dot:nth-child(2){animation-delay:0.15s}.dot:nth-child(3){animation-delay:0.3s}
@keyframes bnc{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-7px);opacity:1}}

/* SCROLL PILL */
.spill{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--ac);color:#fff;font-size:13px;font-weight:500;padding:6px 18px;border-radius:20px;cursor:pointer;display:none;z-index:20;box-shadow:0 4px 16px rgba(99,102,241,0.5);}
.spill.show{display:block;}

/* WELCOME */
.wcard{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(139,92,246,0.06));border:1px solid rgba(99,102,241,0.18);border-radius:20px;padding:20px;margin:4px 2px 14px;text-align:center;}
.wico{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;margin:0 auto 12px;box-shadow:0 8px 28px rgba(99,102,241,0.4);}
.wtit{font-family:'Syne',sans-serif;font-weight:700;font-size:19px;margin-bottom:7px;}
.wsub{font-size:13px;color:var(--txd);line-height:1.6;margin-bottom:14px;}
.qbtns{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.qbtn{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.22);color:var(--ac2);font-size:12px;font-family:'DM Sans',sans-serif;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
.qbtn:hover{background:rgba(99,102,241,0.2);}

/* INPUT */
.ibar{position:relative;z-index:10;background:rgba(17,24,39,0.97);backdrop-filter:blur(20px);padding:9px 10px;padding-bottom:max(9px,env(safe-area-inset-bottom));border-top:1px solid var(--bor);display:flex;align-items:flex-end;gap:7px;flex-shrink:0;}
.atc{color:var(--txm);font-size:21px;cursor:pointer;padding:6px 4px;margin-bottom:3px;flex-shrink:0;}
.iwrap{flex:1;background:var(--sur2);border:1px solid var(--bor);border-radius:22px;display:flex;align-items:flex-end;padding:7px 12px;gap:7px;transition:border-color 0.2s;}
.iwrap:focus-within{border-color:rgba(99,102,241,0.4);}
.tinp{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-size:15px;font-family:'DM Sans',sans-serif;resize:none;max-height:110px;min-height:22px;line-height:1.5;padding:2px 0;overflow-y:auto;}
.tinp::placeholder{color:var(--txm);}
.emoj{color:var(--txm);font-size:19px;cursor:pointer;margin-bottom:1px;}
.rbar{display:none;flex:1;align-items:center;gap:10px;padding:7px 13px;background:var(--sur2);border:1px solid rgba(239,68,68,0.2);border-radius:22px;}
.rbar.act{display:flex;}
.rdot{width:9px;height:9px;border-radius:50%;background:var(--err);animation:blnk 1s infinite;}
@keyframes blnk{0%,100%{opacity:1}50%{opacity:0.3}}
.rlbl{color:var(--err);font-size:14px;font-weight:500;}
.rtim{color:var(--txm);font-size:13px;margin-left:auto;}
.abtn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;align-self:flex-end;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);}
.sndbtn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,0.4);display:none;}
.sndbtn:hover{transform:scale(1.08);}
.sndbtn:active{transform:scale(0.94);}
.micbtn{background:var(--sur2);color:var(--txm);border:1px solid var(--bor);}
.micbtn:hover{color:var(--ac2);}
.micbtn.rec{background:rgba(239,68,68,0.12);color:var(--err);border-color:rgba(239,68,68,0.3);animation:rp 1s infinite;}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)}50%{box-shadow:0 0 0 7px rgba(239,68,68,0)}}

/* TOAST */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:#1a2235;border:1px solid var(--bor);color:var(--txd);font-size:13px;padding:8px 18px;border-radius:20px;z-index:300;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.toast.show{display:block;}
</style>
</head>
<body>

<div class="hdr">
  <span class="back">‹</span>
  <div class="ava">L</div>
  <div class="binfo">
    <div class="bname">Lyra</div>
    <div class="bstat">● online</div>
  </div>
  <div class="hacts">
    <button class="hbtn" onclick="toggleSearch()">🔍</button>
    <button class="hbtn" onclick="toggleMenu()">⋮</button>
  </div>
</div>

<div class="ovl" id="ovl" onclick="closeMenu()"></div>
<div class="ddrop" id="ddrop">
  <button class="ditem" onclick="mAction('clear')"><span class="ic">🗑️</span> Clear Chat</button>
  <button class="ditem" onclick="mAction('export')"><span class="ic">📥</span> Export Chat</button>
  <div class="dsep"></div>
  <button class="ditem" onclick="mAction('voice')"><span class="ic">🔊</span> Toggle Voice</button>
  <button class="ditem" onclick="mAction('about')"><span class="ic">ℹ️</span> About Lyra</button>
</div>

<div class="sbar" id="sbar">
  <input class="sinp" id="sinp" placeholder="Search in chat..." oninput="doSearch(this.value)"/>
  <span class="scls" onclick="closeSearch()">✕</span>
</div>

<div class="toast" id="toast"></div>

<div class="chat" id="chat">
  <div class="dsep2"><span>Today</span></div>
  <div class="wcard">
    <div class="wico">L</div>
    <div class="wtit">Hello! I'm Lyra ✨</div>
    <div class="wsub">Your personal AI assistant with real-time web search. Ask me anything!</div>
    <div class="qbtns">
      <button class="qbtn" onclick="qa('Who is the Prime Minister of India?')">👤 PM of India</button>
      <button class="qbtn" onclick="qa('Weather in Chennai today')">🌤️ Weather</button>
      <button class="qbtn" onclick="qa('Latest IPL 2025 score')">🏏 IPL Score</button>
      <button class="qbtn" onclick="qa('Top news today')">📰 News</button>
    </div>
  </div>
</div>

<div class="spill" id="spill" onclick="scrollBot()">↓ New message</div>

<div class="ibar">
  <span class="atc">📎</span>
  <div class="iwrap" id="iwrap">
    <textarea class="tinp" id="tinp" placeholder="Message Lyra..." rows="1" onkeydown="hKey(event)" oninput="hInput()"></textarea>
    <span class="emoj">😊</span>
  </div>
  <div class="rbar" id="rbar">
    <div class="rdot"></div>
    <span class="rlbl">Recording...</span>
    <span class="rtim" id="rtim">0:00</span>
  </div>
  <button class="abtn micbtn" id="micbtn" onclick="togRec()">🎙️</button>
  <button class="abtn sndbtn" id="sndbtn" onclick="send()">➤</button>
</div>

<script>
const KEY="AIzaSyBaQ3l9cvKM2EUwqE7O-NcN5rWOE29WPJM";
const MDL="gemini-2.5-flash";
const SYS=`You are Lyra, a smart friendly AI assistant.
RULES:
1. Answer ANY question accurately and completely.
2. Use Google Search grounding for real-time facts.
3. End factual answers with: 🔗 [Search Google](https://www.google.com/search?q=QUERY)
4. Use **bold** for key facts. Keep answers concise.
5. Be warm and conversational.
6. If asked who you are: "I'm Lyra, your personal AI assistant!"`;

let hist=[];
try{hist=JSON.parse(localStorage.getItem('lyra')||'[]');}catch(e){}
let loading=false,isRec=false,recog=null,recInt=null,recS=0,scrolled=false,voiceOn=true;

const chat=document.getElementById('chat');
const tinp=document.getElementById('tinp');
const sndbtn=document.getElementById('sndbtn');
const micbtn=document.getElementById('micbtn');
const iwrap=document.getElementById('iwrap');
const rbar=document.getElementById('rbar');
const spill=document.getElementById('spill');

function gt(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function md(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1 ↗</a>')
    .replace(/\n/g,'<br>');
}
function save(){
  if(hist.length>30)hist=hist.slice(-30);
  try{localStorage.setItem('lyra',JSON.stringify(hist));}catch(e){}
}
function toast(msg,d=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}

// Scroll
chat.addEventListener('scroll',()=>{
  const ab=chat.scrollHeight-chat.scrollTop-chat.clientHeight<60;
  scrolled=!ab;
  if(ab)spill.classList.remove('show');
});
function scrollBot(){chat.scrollTop=chat.scrollHeight;spill.classList.remove('show');scrolled=false;}
function mScroll(){if(scrolled)spill.classList.add('show');else scrollBot();}

// Input
function hInput(){
  tinp.style.height='auto';
  tinp.style.height=Math.min(tinp.scrollHeight,110)+'px';
  const h=tinp.value.trim().length>0;
  sndbtn.style.display=h?'flex':'none';
  micbtn.style.display=h?'none':'flex';
}
function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function qa(q){tinp.value=q;hInput();send();}

// Add bubbles
function addUser(txt){
  const r=document.createElement('div');
  r.className='mrow user gap';
  r.innerHTML=`<div class="bub user">${esc(txt)}<div class="mmeta"><span class="mtime">${gt()}</span><span class="tks">✓✓</span></div></div>`;
  chat.appendChild(r);mScroll();
}
function addTyping(){
  const r=document.createElement('div');r.className='trow';r.id='trow';
  r.innerHTML=`<div class="tbub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(r);mScroll();
}
function rmTyping(){const e=document.getElementById('trow');if(e)e.remove();}
function addBot(html,plain){
  const r=document.createElement('div');r.className='mrow bot gap';
  const id='t'+Date.now();
  const tb=voiceOn?`<button class="ttsbtn" id="${id}" onclick="speak(this,\`${plain.replace(/`/g,"'").replace(/\n/g,' ').slice(0,400)}\`)">🔊 Listen</button><br>`:'';
  r.innerHTML=`<div class="bub bot">${html}<br>${tb}<div class="mmeta"><span class="mtime">${gt()}</span></div></div>`;
  chat.appendChild(r);mScroll();
}

// TTS
function speak(btn,txt){
  if(speechSynthesis.speaking){
    speechSynthesis.cancel();
    document.querySelectorAll('.ttsbtn').forEach(b=>{b.classList.remove('sp');b.textContent='🔊 Listen';});
    if(btn._a)return;
  }
  btn._a=true;btn.classList.add('sp');btn.textContent='⏹ Stop';
  const u=new SpeechSynthesisUtterance(txt);u.rate=0.95;
  u.onend=()=>{btn.classList.remove('sp');btn.textContent='🔊 Listen';btn._a=false;};
  speechSynthesis.speak(u);
}

// Gemini API
async function callAI(txt,tries=3){
  const msgs=[...hist.slice(-10),{role:'user',parts:[{text:txt}]}];
  for(let i=0;i<tries;i++){
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MDL}:generateContent?key=${KEY}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          system_instruction:{parts:[{text:SYS}]},
          contents:msgs,
          tools:[{google_search:{}}],
          generationConfig:{maxOutputTokens:900,temperature:0.7}
        })
      });
      if((res.status===503||res.status===429)&&i<tries-1){
        toast(`⏳ High demand, retrying... (${i+1}/${tries})`);
        await new Promise(r=>setTimeout(r,3000*(i+1)));
        continue;
      }
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`Error ${res.status}`);}
      const d=await res.json();
      const t=d.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'';
      return t.trim()||'Sorry, I could not get an answer. Please try again.';
    }catch(e){if(i===tries-1)throw e;await new Promise(r=>setTimeout(r,2000));}
  }
}

// Send
async function send(){
  const txt=tinp.value.trim();
  if(!txt||loading)return;
  loading=true;
  tinp.value='';tinp.style.height='auto';
  sndbtn.style.display='none';micbtn.style.display='flex';
  addUser(txt);addTyping();
  try{
    const ans=await callAI(txt);
    hist.push({role:'user',parts:[{text:txt}]});
    hist.push({role:'model',parts:[{text:ans}]});
    save();rmTyping();
    const plain=ans.replace(/\[([^\]]+)\]\([^\)]+\)/g,'$1').replace(/\*\*/g,'').replace(/\*/g,'');
    addBot(md(ans),plain);
  }catch(e){rmTyping();addBot(`⚠️ <strong>Error:</strong> ${esc(e.message)}<br><small>Please try again.</small>`,'Error.');}
  loading=false;
}

// Voice
function togRec(){
  if(isRec){if(recog)recog.stop();}
  else{
    if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){toast('🎙️ Voice only works in Chrome');return;}
    isRec=true;micbtn.classList.add('rec');micbtn.textContent='⏹️';
    iwrap.style.display='none';rbar.classList.add('act');
    recS=0;document.getElementById('rtim').textContent='0:00';
    recInt=setInterval(()=>{recS++;const m=Math.floor(recS/60),s=recS%60;document.getElementById('rtim').textContent=`${m}:${s.toString().padStart(2,'0')}`;},1000);
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recog=new SR();recog.lang='en-US';recog.continuous=false;recog.interimResults=false;
    recog.start();
    recog.onresult=e=>doneRec(e.results[0][0].transcript);
    recog.onend=()=>{if(isRec)doneRec(null);};
    recog.onerror=()=>doneRec(null);
  }
}
function doneRec(t){
  isRec=false;micbtn.classList.remove('rec');micbtn.textContent='🎙️';
  iwrap.style.display='flex';rbar.classList.remove('act');
  clearInterval(recInt);
  if(t&&t.trim()){tinp.value=t.trim();hInput();setTimeout(()=>send(),100);}
}

// Search
let sOpen=false;
function toggleSearch(){
  sOpen=!sOpen;
  const b=document.getElementById('sbar');
  if(sOpen){b.classList.add('show');document.getElementById('sinp').focus();}
  else closeSearch();
}
function closeSearch(){
  sOpen=false;
  document.getElementById('sbar').classList.remove('show');
  document.getElementById('sinp').value='';
}
function doSearch(q){
  if(!q.trim())return;
  const bubs=chat.querySelectorAll('.bub');
  let found=0;
  bubs.forEach(b=>{if(b.innerText.toLowerCase().includes(q.toLowerCase())){found++;if(found===1)b.scrollIntoView({behavior:'smooth',block:'center'});}});
  toast(found?`Found ${found} result${found>1?'s':''}`:'No results found');
}

// Menu
function toggleMenu(){
  const d=document.getElementById('ddrop'),o=document.getElementById('ovl');
  if(d.classList.contains('show')){closeMenu();}else{d.classList.add('show');o.classList.add('show');}
}
function closeMenu(){document.getElementById('ddrop').classList.remove('show');document.getElementById('ovl').classList.remove('show');}
function mAction(a){
  closeMenu();
  if(a==='clear'){
    if(confirm('Clear all chat history?')){
      chat.innerHTML='<div class="dsep2"><span>Today</span></div>';
      hist=[];localStorage.removeItem('lyra');toast('🗑️ Chat cleared!');
    }
  }else if(a==='export'){
    let txt='Lyra AI Chat\n'+'─'.repeat(30)+'\n\n';
    chat.querySelectorAll('.bub').forEach(b=>{
      const role=b.classList.contains('user')?'You':'Lyra';
      txt+=`[${role}]\n${b.innerText.split('\n').slice(0,-1).join('\n').trim()}\n\n`;
    });
    const a2=document.createElement('a');
    a2.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
    a2.download='lyra-chat.txt';a2.click();toast('📥 Chat exported!');
  }else if(a==='voice'){
    voiceOn=!voiceOn;toast(voiceOn?'🔊 Voice replies ON':'🔇 Voice replies OFF');
  }else if(a==='about'){
    addBot(`<strong>Lyra AI</strong> ✨<br><br>• Powered by <strong>Gemini 2.5 Flash</strong><br>• Real-time web search<br>• Chat history saved<br>• Voice input & TTS<br><br>Built just for you! 💜`,'About Lyra');
  }
}

scrollBot();tinp.focus();
</script>
